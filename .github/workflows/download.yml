name: Download and Release File

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install gdown
        run: pip install gdown

      - name: Download file
        run: |
          mkdir data
          cd data
          gdown "https://drive.google.com/uc?id=1MVNATVuv5zzIg72hzGXB8oMAo_-XjOaI"

      - name: Move file to workspace
        run: |
          mkdir release_files
          mv data/* release_files/

      - name: Create Git tag
        run: |
          git tag v1.3.0
          git push origin v1.3.0

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3.0
          name: "Auto Release v1.3.0"
          files: release_files/*
