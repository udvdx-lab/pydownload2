name: Download and Release File

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install gdown
        run: pip install gdown

      - name: Download file
        run: |
          mkdir data
          cd data
          gdown "https://drive.google.com/uc?id=1xZ4arShrbDnZcMbE9yrjcjl3M5DnX-i1"

      - name: Move file to workspace
        run: |
          mkdir release_files
          mv data/* release_files/

      - name: Create Git tag
        run: |
          git tag v5
          git push origin v5

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5
          name: "Auto Release v5"
          files: release_files/*
